[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/api/analyse-setup"
  to = "/.netlify/functions/analyse-setup"
  status = 200

[[redirects]]
  from = "/api/market-data"
  to = "/.netlify/functions/market-data"
  status = 200

[[redirects]]
  from = "/api/tracked-state"
  to = "/.netlify/functions/tracked-state"
  status = 200

[[redirects]]
  from = "/api/push-config"
  to = "/.netlify/functions/push-config"
  status = 200

[[redirects]]
  from = "/api/push-subscribe"
  to = "/.netlify/functions/push-subscribe"
  status = 200

[[redirects]]
  from = "/api/paper-trade"
  to = "/.netlify/functions/paper-trade"
  status = 200
