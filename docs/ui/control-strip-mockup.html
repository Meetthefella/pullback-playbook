<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control Strip Mockup</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f1117; }

.header-bar {
  background: #151820;
  padding: 14px 16px 0;
}

.title {
  font-size: 18px;
  font-weight: 500;
  color: #fff;
}
.subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}

.chips-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 12px;
}

.chip {
  flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 11px;
  cursor: pointer;
}

.chip-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  display: block;
}
.chip-value {
  font-size: 13px;
  color: #fff;
  font-weight: 500;
}

.pill-selector {
  background: #1c2030;
  border-top: 0.5px solid rgba(255,255,255,0.07);
  padding: 10px 16px;
}

.pill-label {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 7px;
}

.pills {
  display: flex;
  gap: 6px;
}

.pill {
  padding: 5px 13px;
  border-radius: 20px;
  border: 0.5px solid rgba(255,255,255,0.15);
  font-size: 13px;
  color: rgba(255,255,255,0.55);
}

.pill.selected {
  background: rgba(26,210,150,0.15);
  border-color: rgba(26,210,150,0.4);
  color: #1ad296;
}
</style>
</head>

<body>

<div class="header-bar">
  <div class="title">Pullback Playbook</div>
  <div class="subtitle">Scan, shortlist, review, decide, then track.</div>

  <div class="chips-row">
    <div class="chip">
      <span class="chip-label">Market</span>
      <span class="chip-value">S&P below 50 MA</span>
    </div>

    <div class="chip">
      <span class="chip-label">Account | Risk</span>
      <span class="chip-value">£4,000 | £40</span>
    </div>

    <div class="chip">
      <span class="chip-label">Scanner Mode</span>
      <span class="chip-value">TradingView</span>
    </div>

    <div class="chip">
      <span class="chip-label">Setup Type</span>
      <span class="chip-value">50MA</span>
    </div>
  </div>
</div>

<div class="pill-selector">
  <div class="pill-label">Setup Type</div>
  <div class="pills">
    <div class="pill">Unknown</div>
    <div class="pill">20MA</div>
    <div class="pill selected">50MA</div>
  </div>
</div>

</body>
